[Game]
# Initial screen dimensions
screen_width = 800
screen_height = 600
fps = 60

# Game difficulty settings
initial_lives = 3
snake_initial_size = 5

[Graphics]
# Font settings
enable_custom_fonts = true
fallback_to_default_fonts = true

# Visual effects
enable_animations = true
enable_particles = true
enable_mouse_trail = true

[Audio]
# Audio settings (placeholder for future audio implementation)
enable_sound = false
music_volume = 0.7
sound_effects_volume = 0.8

[Development]
# Development and debugging options
debug_mode = false
show_fps = false
log_level = INFO

[Education]
# Educational content settings
include_numbers = true
include_letters = true
include_shapes = true
difficulty_progression = true

[Mobile]
# Mobile adaptability settings
enable_mobile_mode = true
touch_friendly_ui = true
adaptive_scaling = true
minimum_touch_target_size = 44
mobile_orientation = auto

# Mobile screen presets (width x height)
# Common mobile resolutions
mobile_portrait_width = 390
mobile_portrait_height = 844
mobile_landscape_width = 844
mobile_landscape_height = 390

# Tablet presets
tablet_portrait_width = 768
tablet_portrait_height = 1024
tablet_landscape_width = 1024
tablet_landscape_height = 768

[EventTracking]
# Event tracking for debugging and analytics
enable_event_tracking = true
log_input_events = true
log_performance_metrics = true
log_screen_events = true
track_touch_gestures = true
event_log_level = DEBUG